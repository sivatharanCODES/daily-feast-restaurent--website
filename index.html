<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🍔 DailyFeast | Premium Dining</title>
    <!--Linking Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Noto+Serif:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <!-- links css style -->
    <link href="css/style.css" rel="stylesheet" />
    <!-- links Javascript file -->
    <script src="js/script.js" defer></script>
  </head>
  <body>
    <!-- Header -->
    <header>
      <nav>
        <div class="nav-container">
          <a href="#">
            <img
              src="images/dailyfeast_logo.png"
              alt="DailyFeast logo"
              class="logo"
            />
          </a>
          <ul class="nav-menu">
            <li><a href="#" class="nav-link">Home</a></li>
            <li><a href="#" class="nav-link">About Us</a></li>
            <li><a href="#" class="nav-link">Order Online</a></li>
            <li><a href="#" class="nav-link">Reservations</a></li>
            <li><a href="#" class="nav-link">Testimonials</a></li>
          </ul>
          <div class="nav-action">
            <button
              type="button"
              class="icon-btn theme-btn"
              aria-label="Toggle theme"
            >
              <svg
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                aria-hidden="true"
              >
                <path
                  d="M12 3.25V2m0 20v-1.25m9-8.75H22m-20 0h1.25m15.5-6.5l.88-.88m-13.76 13.76l.88-.88m13.76 0l-.88-.88m-13.76-13.76l-.88-.88M12 6.5a5.5 5.5 0 100 11 5.5 5.5 0 000-11z"
                  stroke="currentColor"
                  stroke-width="1.75"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </button>
            <button
              type="button"
              class="icon-btn cart-btn"
              aria-label="Shopping cart"
            >
              <svg
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                aria-hidden="true"
              >
                <path
                  d="M6 6h15l-1.5 9H8.5L6 6zm0 0L4 3H2"
                  stroke="currentColor"
                  stroke-width="1.75"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <circle cx="9" cy="20" r="1.5" fill="currentColor" />
                <circle cx="18" cy="20" r="1.5" fill="currentColor" />
              </svg>
            </button>
          </div>
        </div>
      </nav>
    </header>
  </body>
</html>
